<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSR Broadcast Console</title>

<style>

/* =========================
   GLOBAL FONT SYSTEM
========================= */

*{
  box-sizing:border-box;
  font-family:"Inter","Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body{
  margin:0;
  font-family:"Inter","Helvetica Neue",Arial,sans-serif;
  background:#f5f7fb;
  color:#111;
  overflow-x:hidden;
  letter-spacing:0.2px;
}

/* =========================
   BACKGROUND VIDEO
========================= */

#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.9) saturate(1.4) contrast(1.1);
  transform:scale(1.05);
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,120,255,0.40), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,180,255,0.30), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(0,80,255,0.25), transparent 55%),
    linear-gradient(180deg, rgba(0,90,255,0.20), rgba(0,0,40,0.55));
  z-index:-4;
}

/* =========================
   TOP BAR + ON AIR
========================= */

.topbar{
  position:sticky;
  top:0;
  width:100%;
  padding:10px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,0,0,0.05);
  z-index:10;
  font-size:12px;
  letter-spacing:1.5px;
  color:#333;
}

.onair-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}

.onair-strip{
  font-size:11px;
  font-weight:800;
  letter-spacing:2px;
  padding:4px 10px;
  border-radius:4px;
  color:#fff;
  background:linear-gradient(90deg,#ff0000,#ff2b2b,#ff0066);
  box-shadow:0 0 10px rgba(255,0,0,0.6);
  animation:onAirPulse 1.2s infinite ease-in-out;
}

@keyframes onAirPulse{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.08);opacity:0.85;}
}

.live-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ff2b2b;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

/* =========================
   LAYOUT
========================= */

.app{
  max-width:1200px;
  margin:0 auto;
  padding:70px 20px 20px;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  gap:18px;
}

.header{
  text-align:center;
  margin-top:auto;
}

.header h1{
  margin:0;
  font-size:56px;
  font-weight:800;
  letter-spacing:2px;
  background:linear-gradient(90deg,#0066ff,#00c2ff,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header h2{
  margin-top:6px;
  font-size:13px;
  letter-spacing:3px;
  color:#555;
}

/* =========================
   CONSOLE
========================= */

.console{
  display:grid;
  grid-template-columns: 1.4fr 1fr;
  gap:18px;
}

.panel{
  background:rgba(255,255,255,0.94);
  border-radius:14px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* =========================
   VIDEO PANEL (PLAYER RESTORED)
========================= */

.video-panel{
  position:relative;
  overflow:hidden;
  min-height:360px;
  border:1px solid rgba(0,180,255,0.25);
}

.panel-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

.panel-overlay{
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.65)),
    radial-gradient(circle at 30% 20%, rgba(0,120,255,0.25), transparent 60%);
  z-index:1;
}

.panel-content{
  position:relative;
  z-index:2;
  padding:18px;
}

/* =========================
   NOW PLAYING (RESTORED FULL)
========================= */

.now-playing{
  display:flex;
  gap:16px;
  align-items:center;
}

#cover{
  width:140px;
  height:140px;
  border-radius:12px;
  object-fit:cover;
  border:2px solid rgba(0,194,255,0.8);
  box-shadow:
    0 0 10px rgba(0,194,255,0.8),
    0 0 20px rgba(0,194,255,0.7),
    0 0 40px rgba(0,194,255,0.6);
  animation:coverPulse 2.5s infinite ease-in-out;
}

@keyframes coverPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

#track{
  font-size:18px;
  font-weight:700;
  color:#fff;
}

.sub{
  font-size:12px;
  color:rgba(255,255,255,0.75);
  margin-top:4px;
}

.meters{
  display:flex;
  gap:3px;
  margin-top:12px;
  height:30px;
  align-items:flex-end;
}

.meters span{
  width:4px;
  background:linear-gradient(to top,#0066ff,#00c2ff,#ff00cc);
  animation:vu 1s infinite ease-in-out;
  border-radius:2px;
}

@keyframes vu{
  0%,100%{height:5px;opacity:0.5}
  50%{height:30px;opacity:1}
}

/* STREAM */
.stream{
  margin-top:14px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.15);
}

/* =========================
   MESSAGE PANEL FIX (NEON NAVY TITLE)
========================= */

.message-panel h3{
  color:#1f4fff;
  font-size:18px;
  font-weight:800;
  text-shadow:0 0 8px rgba(31,79,255,0.6);
}

/* INPUTS */
input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  font-size:13px;
}

/* BUTTON */
button{
  margin-top:12px;
  width:100%;
  padding:13px;
  background:linear-gradient(90deg,#0066ff,#00c2ff,#ff00cc);
  border:none;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
  color:#fff;
}

/* MOBILE */
@media(max-width:900px){
  .console{grid-template-columns:1fr;}
  .header h1{font-size:38px;}
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://video.wixstatic.com/video/4657a4_aaaaed5a8c4a4ada90f76bf1ae6ce200/720p/mp4/file.mp4">
</video>

<div class="overlay"></div>

<div class="topbar">
  <div class="onair-wrap">
    <span class="onair-strip">ON AIR</span>
    <span class="live-dot"></span>
    PSR LIVE BROADCAST
  </div>
  <div>PRODIGALSUNRADIO.COM</div>
</div>

<div class="app">

  <div class="header">
    <h1>PRODIGAL SUN RADIO</h1>
    <h2>LIVE BROADCAST CONSOLE</h2>
  </div>

  <div class="console">

    <!-- PLAYER (FULLY RESTORED) -->
    <div class="panel video-panel">

      <video class="panel-video" autoplay muted loop playsinline>
        <source src="https://video.wixstatic.com/video/4657a4_6eda907b96f946c5a7d5d65d21e9c679/1080p/mp4/file.mp4">
      </video>

      <div class="panel-overlay"></div>

      <div class="panel-content">

        <div class="now-playing">

          <img id="cover" src="https://i.imgur.com/QPevqGi.png">

          <div>
            <div id="track">Loading...</div>
            <div class="sub">Live Studio Feed</div>

            <div class="meters">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>

        </div>

        <div class="stream">
          <iframe width="100%" height="140"
          src="https://player.radioking.io/the-channel-x/?c=%23000&c2=%230066ff"
          frameborder="0"></iframe>
        </div>

      </div>
    </div>

    <!-- MESSAGE PANEL -->
    <div class="panel video-panel message-panel">

      <video class="panel-video" autoplay muted loop playsinline>
        <source src="https://video.wixstatic.com/video/4657a4_ed23124ce0fe4a389be438464a925a0c/720p/mp4/file.mp4">
      </video>

      <div class="panel-overlay"></div>

      <div class="panel-content">

        <h3>Send Message to Studio</h3>

        <input id="name" placeholder="Your Name">
        <textarea id="message" placeholder="Your Message"></textarea>

        <button onclick="sendMessage()">SEND</button>

        <div id="status"></div>

      </div>

    </div>

  </div>

</div>

<script>

async function sendMessage(){
  const name=document.getElementById("name");
  const message=document.getElementById("message");
  const status=document.getElementById("status");

  status.innerText="Sending...";

  await fetch("https://formspree.io/f/mykvabzl",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name.value,message:message.value})
  });

  status.innerText="Message Sent ✔";

  name.value="";
  message.value="";
}

</script>

</body>
</html>
