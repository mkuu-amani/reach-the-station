<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSR Live Hub - Broadcast TV Style</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,Arial;
  background:#f5f7fb;
  color:#111;
  overflow-x:hidden;
}

/* =========================
   BACKGROUND (BRIGHT TV LAYER)
========================= */

#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.85) saturate(1.4) contrast(1.1);
  transform:scale(1.05);
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,180,255,0.18), transparent 45%),
    radial-gradient(circle at 80% 30%, rgba(255,0,150,0.12), transparent 50%),
    rgba(245,247,251,0.65);
  z-index:-4;
}

/* =========================
   TOP BAR (LG CHANNEL STYLE)
========================= */

.topbar{
  position:fixed;
  top:0;
  width:100%;
  padding:10px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,0,0,0.05);
  z-index:10;
  font-size:12px;
  letter-spacing:1.5px;
  color:#333;
}

.live-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ff2b2b;
  display:inline-block;
  margin-right:8px;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

/* =========================
   MAIN WRAPPER
========================= */

.app{
  max-width:1200px;
  margin:80px auto;
  padding:20px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:18px;
}

.header h1{
  margin:0;
  font-size:56px;
  font-weight:800;
  letter-spacing:2px;
  background:linear-gradient(90deg,#0066ff,#ff00cc,#00e5ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header h2{
  margin-top:6px;
  font-size:13px;
  letter-spacing:3px;
  color:#555;
}

/* =========================
   MAIN GRID (TV STYLE PANELS)
========================= */

.console{
  display:grid;
  grid-template-columns: 1.4fr 1fr;
  gap:18px;
}

/* PANELS */
.panel{
  background:rgba(255,255,255,0.92);
  border:1px solid rgba(0,0,0,0.06);
  border-radius:14px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* =========================
   NOW PLAYING (BRIGHT CARD)
========================= */

.now-playing{
  display:flex;
  gap:16px;
  align-items:center;
}

#cover{
  width:140px;
  height:140px;
  border-radius:12px;
  object-fit:cover;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

#track{
  font-size:18px;
  font-weight:700;
  color:#111;
}

.sub{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

/* =========================
   VU METERS (BRIGHT TV STYLE)
========================= */

.meters{
  display:flex;
  gap:3px;
  margin-top:12px;
  height:30px;
  align-items:flex-end;
}

.meters span{
  width:4px;
  background:linear-gradient(to top,#0066ff,#ff00cc,#00e5ff);
  animation:vu 1s infinite ease-in-out;
  border-radius:2px;
}

@keyframes vu{
  0%,100%{height:5px;opacity:0.5}
  50%{height:30px;opacity:1}
}

/* =========================
   STREAM
========================= */

.stream{
  margin-top:14px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(0,0,0,0.06);
}

/* =========================
   MESSAGE PANEL (CLEAN UI)
========================= */

input,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  background:#fff;
  color:#111;
  outline:none;
  font-size:13px;
}

input:focus,textarea:focus{
  border-color:#0066ff;
  box-shadow:0 0 10px rgba(0,102,255,0.15);
}

button{
  margin-top:12px;
  width:100%;
  padding:13px;
  background:linear-gradient(90deg,#0066ff,#ff00cc);
  border:none;
  border-radius:10px;
  font-weight:800;
  cursor:pointer;
  color:#fff;
}

/* =========================
   INFO TILE
========================= */

.info-tile{
  margin-top:14px;
  padding:12px;
  border-radius:10px;
  background:rgba(0,0,0,0.03);
  font-size:12px;
  color:#555;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){
  .console{
    grid-template-columns:1fr;
  }

  .header h1{
    font-size:38px;
  }

  #cover{
    width:110px;
    height:110px;
  }
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://video.wixstatic.com/video/4657a4_d5cf9c3f434847e699e739b1d7e3c466/720p/mp4/file.mp4">
</video>

<div class="overlay"></div>

<div class="topbar">
  <div><span class="live-dot"></span>PSR LIVE BROADCAST</div>
  <div>PRODIGALSUNRADIO.COM</div>
</div>

<div class="app">

  <div class="header">
    <h1>PRODIGAL SUN RADIO</h1>
    <h2>LG CHANNEL STYLE BROADCAST HUB</h2>
  </div>

  <div class="console">

    <!-- NOW PLAYING -->
    <div class="panel">

      <div class="now-playing">

        <img id="cover" src="https://i.imgur.com/QPevqGi.png">

        <div>
          <div id="track">Loading...</div>
          <div class="sub">Live Studio Feed</div>

          <div class="meters">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>

      </div>

      <div class="stream">
        <iframe width="100%" height="140"
        src="https://player.radioking.io/the-channel-x/?c=%23000&c2=%230066ff"
        frameborder="0"></iframe>
      </div>

      <div class="info-tile">
        LIVE BROADCAST • HOUSE • AFRO • DNB • REGGAE • GLOBAL SESSIONS
      </div>

    </div>

    <!-- MESSAGE -->
    <div class="panel">

      <h3>Send Message to Studio</h3>

      <input id="name" placeholder="Your Name">
      <textarea id="message" placeholder="Your Message"></textarea>

      <button onclick="sendMessage()">SEND TO STUDIO</button>

      <div id="status"></div>

    </div>

  </div>

</div>

<script>

/* NOW PLAYING */
const API="https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function update(){
  try{
    const r=await fetch(API);
    const d=await r.json();
    document.getElementById("track").innerHTML =
      "<b>"+d.artist+"</b><br>"+d.title;
    document.getElementById("cover").src =
      d.cover || "https://i.imgur.com/QPevqGi.png";
  }catch(e){}
}

update();
setInterval(update,15000);

/* MESSAGE */
async function sendMessage(){
  const name=document.getElementById("name");
  const message=document.getElementById("message");
  const status=document.getElementById("status");

  status.innerText="Sending...";

  await fetch("https://formspree.io/f/mykvabzl",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name.value,message:message.value})
  });

  status.innerText="Message Delivered ✔";
}

</script>

</body>
</html>
