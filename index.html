<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSR Live Hub</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: #0b0c10;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 900px;
  display: grid;
  gap: 18px;
}

/* HEADER */
header {
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

/* NOW PLAYING CARD */
.card {
  background: #151820;
  border-radius: 16px;
  padding: 18px;
  display: flex;
  gap: 18px;
  align-items: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  position: relative;
}

.live {
  position: absolute;
  top: 10px;
  right: 12px;
  background: #ff3b3b;
  color: #fff;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 20px;
}

/* ONLY COVER ART HERE */
#cover {
  width: clamp(160px, 20vw, 220px);
  height: clamp(160px, 20vw, 220px);
  border-radius: 14px;
  object-fit: cover;
}

/* TRACK TEXT */
#track {
  font-size: 16px;
  line-height: 1.4;
}

.sub {
  color: #aaa;
  font-size: 13px;
  margin-top: 6px;
}

/* =========================
   CUSTOM NEON AUDIO PLAYER
   (REPLACES IFRAME COMPLETELY)
========================= */

.neon-player {
  margin-top: 14px;
  padding: 10px;
  border-radius: 14px;
  background: #0d0f14;

  box-shadow:
    0 0 12px rgba(0,229,255,0.25),
    0 0 30px rgba(0,229,255,0.12);
}

audio {
  width: 100%;
  outline: none;
  filter: drop-shadow(0 0 10px rgba(0,229,255,0.25));
}

/* MESSAGE FORM */
.panel {
  background: #12141a;
  border-radius: 16px;
  padding: 18px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #2a2f3a;
  background: #0d0f14;
  color: #fff;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #1db954;
  color: #000;
  font-weight: 700;
  cursor: pointer;
}

button:hover {
  background: #17a74a;
}

#status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}

/* MOBILE */
@media (max-width: 600px) {
  .card {
    flex-direction: column;
    text-align: center;
  }

  #cover {
    width: 180px;
    height: 180px;
  }
}
</style>
</head>

<body>

<div class="app">

  <header>
    <h1>🎧 Prodigal Sun Radio</h1>
  </header>

  <!-- NOW PLAYING (SINGLE SOURCE OF TRUTH) -->
  <div class="card">

    <div class="live">LIVE</div>

    <img id="cover" src="https://i.imgur.com/QPevqGi.png">

    <div>
      <div id="track">Loading now playing...</div>
      <div class="sub">Live from PSR Studio</div>

      <!-- CUSTOM AUDIO PLAYER (NO IFRAME) -->
      <div class="neon-player">
        <audio id="psr-audio" controls></audio>
      </div>

    </div>
  </div>

  <!-- MESSAGE FORM -->
  <div class="panel">
    <h3>✉️ Send Message to HQ</h3>

    <input type="text" id="name" placeholder="Your name">
    <textarea id="message" placeholder="Your message"></textarea>

    <button onclick="sendMessage()">Send Message</button>
    <div id="status"></div>
  </div>

</div>

<script>

/* ======================
   STREAM (CUSTOM PLAYER)
====================== */

const STREAM_URL = "https://listen.radioking.com/radio/443393/stream/497783";
const audio = document.getElementById("psr-audio");

audio.src = STREAM_URL;
audio.volume = 0.85;

/* attempt autoplay (browser may block) */
window.addEventListener("load", async () => {
  try {
    await audio.play();
  } catch (e) {
    console.log("Autoplay blocked - user interaction required");
  }
});

/* ======================
   NOW PLAYING (ONLY SOURCE)
====================== */

const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function updateNowPlaying() {
  try {
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();

    const artist = data.artist || "Unknown Artist";
    const title = data.title || "Unknown Title";
    const cover = data.cover || "https://i.imgur.com/QPevqGi.png";

    document.getElementById("track").innerHTML =
      "<b>" + artist + "</b><br>" + title;

    document.getElementById("cover").src = cover;

  } catch (e) {
    document.getElementById("track").innerText =
      "Unable to load now playing";
  }
}

updateNowPlaying();
setInterval(updateNowPlaying, 15000);


/* ======================
   FORM (FORMSPREE)
====================== */

const ENDPOINT = "https://formspree.io/f/mykvabzl";

async function sendMessage() {
  const name = document.getElementById("name").value.trim();
  const message = document.getElementById("message").value.trim();
  const status = document.getElementById("status");

  if (!name || !message) {
    status.innerText = "Please fill in all fields";
    return;
  }

  status.innerText = "Sending...";

  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({ name, message, station: "PSR Live Hub" })
    });

    if (res.ok) {
      status.innerText = "Message sent to HQ ✔";
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";
    } else {
      status.innerText = "Failed to send message";
    }

  } catch (err) {
    status.innerText = "Network error";
  }
}

</script>

</body>
</html>
