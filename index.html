<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSR Live Hub - Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,Arial;
  color:#fff;
  overflow-x:hidden;
  background:#000;
}

/* VIDEO BACKGROUND */
#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.55) contrast(1.1) saturate(1.2);
  transform:scale(1.1);
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 20%, rgba(0,229,255,0.15), transparent 40%),
             radial-gradient(circle at 80% 80%, rgba(255,0,150,0.10), transparent 45%),
             rgba(5,6,10,0.65);
  z-index:-4;
}

/* TICKER */
.ticker{
  position:fixed;
  top:0;
  width:100%;
  overflow:hidden;
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid rgba(255,255,255,0.08);
  z-index:10;
}

.ticker span{
  display:inline-block;
  white-space:nowrap;
  padding:12px 0;
  animation:scroll 25s linear infinite;
  font-size:13px;
  letter-spacing:2px;
}

@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* LAYOUT */
.app{
  max-width:1200px;
  margin:80px auto 60px;
  padding:20px;
  display:grid;
  gap:24px;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px 20px;
}

.hero h1{
  font-size:56px;
  margin:0;
  letter-spacing:2px;
}

.hero h2{
  font-weight:400;
  color:#aaa;
  margin-top:10px;
}

/* GLASS CARD */
.card,.panel{
  background:rgba(20,22,30,0.65);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(14px);
  border-radius:18px;
  padding:22px;
  box-shadow:0 0 30px rgba(0,229,255,0.08);
}

/* NOW PLAYING */
.card{
  display:flex;
  gap:20px;
  align-items:center;
  position:relative;
}

.live{
  position:absolute;
  top:12px;
  right:12px;
  background:#ff3b3b;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}

#cover{
  width:220px;
  height:220px;
  border-radius:14px;
  object-fit:cover;
}

/* INFO */
.info{flex:1}

#track{font-size:22px;margin-bottom:6px}
.sub{color:#aaa;margin-bottom:10px}

/* WAVES */
.wave{
  display:flex;
  gap:4px;
  height:40px;
  align-items:flex-end;
  margin-top:10px;
}

.wave div{
  width:6px;
  background:#00e5ff;
  animation:wave 1.2s infinite ease-in-out;
}

.wave div:nth-child(2){animation-delay:.1s}
.wave div:nth-child(3){animation-delay:.2s}
.wave div:nth-child(4){animation-delay:.3s}
.wave div:nth-child(5){animation-delay:.4s}

@keyframes wave{
  0%,100%{height:6px}
  50%{height:40px}
}

/* FORM */
input,textarea{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(0,0,0,0.4);
  color:#fff;
}

button{
  margin-top:12px;
  width:100%;
  padding:14px;
  background:#1db954;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

/* PARTICLES */
.particle{
  position:fixed;
  width:3px;
  height:3px;
  background:#00e5ff;
  border-radius:50%;
  opacity:0.5;
  animation:float 12s linear infinite;
  z-index:-3;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

@media(max-width:700px){
  .card{flex-direction:column;text-align:center}
  #cover{width:180px;height:180px}
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://video.wixstatic.com/video/4657a4_d5cf9c3f434847e699e739b1d7e3c466/720p/mp4/file.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="ticker">
  <span>PSR LIVE • HOUSE • AFRO HOUSE • DNB • REGGAE • DUBSTEP • NEW MUSIC DAILY • GLOBAL DJ SESSIONS • PSR COMMUNITY RADIO • </span>
</div>

<div class="app">

  <div class="hero">
    <h1>Prodigal Sun Radio</h1>
    <h2>ProdigalSunRadio.com</h2>
  </div>

  <div class="card">
    <div class="live">LIVE</div>

    <img id="cover" src="https://i.imgur.com/QPevqGi.png">

    <div class="info">
      <div id="track">Loading...</div>
      <div class="sub">Live from PSR Studio</div>

      <div class="wave">
        <div></div><div></div><div></div><div></div><div></div>
      </div>

      <iframe width="100%" height="160"
      src="https://player.radioking.io/the-channel-x/?c=%23000&c2=%2300e5ff"
      frameborder="0"></iframe>
    </div>
  </div>

  <div class="panel">
    <h3>Send Message to HQ</h3>
    <input id="name" placeholder="Name">
    <textarea id="message" placeholder="Message"></textarea>
    <button onclick="sendMessage()">Send</button>
    <div id="status"></div>
  </div>

</div>

<script>

/* PARTICLES */
for(let i=0;i<30;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(8+Math.random()*10)+"s";
  document.body.appendChild(p);
}

/* NOW PLAYING */
const API="https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function update(){
  try{
    const r=await fetch(API);
    const d=await r.json();
    document.getElementById("track").innerHTML=
      "<b>"+d.artist+"</b><br>"+d.title;
    document.getElementById("cover").src=d.cover||"https://i.imgur.com/QPevqGi.png";
  }catch(e){}
}

update();
setInterval(update,15000);

/* FORM */
async function sendMessage(){
  const name=document.getElementById("name");
  const message=document.getElementById("message");
  const status=document.getElementById("status");

  status.innerText="Sending...";

  await fetch("https://formspree.io/f/mykvabzl",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name.value,message:message.value})
  });

  status.innerText="Sent ✔";
}
</script>

</body>
</html>
