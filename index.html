<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSR Live Hub - DJ Deck</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,Arial;
  color:#fff;
  overflow-x:hidden;
  background:#05060a;
}

/* =========================
   BACKGROUND
========================= */

#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.45) contrast(1.25) saturate(1.5) hue-rotate(-8deg);
  transform:scale(1.08);
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(0,229,255,0.35), transparent 45%),
    radial-gradient(circle at 85% 25%, rgba(255,0,200,0.28), transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(140,0,255,0.25), transparent 50%),
    rgba(5,6,10,0.65);
  z-index:-4;
}

/* =========================
   TICKER
========================= */

.ticker{
  position:fixed;
  top:0;
  width:100%;
  overflow:hidden;
  background:rgba(0,0,0,0.55);
  border-bottom:1px solid rgba(0,229,255,0.25);
  backdrop-filter:blur(10px);
  z-index:10;
}

.ticker span{
  display:inline-block;
  white-space:nowrap;
  padding:12px 0;
  animation:scroll 18s linear infinite;
  font-size:12px;
  letter-spacing:3px;
  color:#00e5ff;
}

@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* =========================
   LAYOUT
========================= */

.app{
  max-width:1200px;
  margin:90px auto 60px;
  padding:20px;
}

.hero{
  text-align:center;
  padding:30px 20px 10px;
}

.hero h1{
  font-size:64px;
  margin:0;
  background:linear-gradient(90deg,#00e5ff,#ff00cc,#8a2be2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero h2{
  color:#9aa0ff;
  margin-top:10px;
}

/* =========================
   DJ DECK SECTION
========================= */

.dj-stage{
  display:grid;
  grid-template-columns: 1fr 320px 1fr;
  gap:20px;
  align-items:center;
  margin-top:20px;
}

/* deck panels */
.deck{
  background:linear-gradient(145deg,rgba(20,22,30,0.75),rgba(10,12,18,0.55));
  border:1px solid rgba(0,229,255,0.18);
  border-radius:18px;
  padding:20px;
  position:relative;
  overflow:hidden;
  min-height:260px;
}

/* glowing border */
.deck::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(120deg,#00e5ff,#ff00cc,#8a2be2);
  opacity:0.2;
  filter:blur(20px);
}

/* center console */
.mixer{
  background:rgba(10,12,18,0.85);
  border:1px solid rgba(0,229,255,0.25);
  border-radius:20px;
  padding:18px;
  text-align:center;
  position:relative;
  box-shadow:0 0 30px rgba(0,229,255,0.1);
}

/* spinning hub */
.spin-disc{
  width:90px;
  height:90px;
  margin:10px auto;
  border-radius:50%;
  background:conic-gradient(#00e5ff,#ff00cc,#8a2be2,#00e5ff);
  animation:spin 3s linear infinite;
  box-shadow:0 0 25px rgba(0,229,255,0.3);
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* crossfader */
.fader{
  width:100%;
  margin-top:15px;
}

input[type=range]{
  width:100%;
}

/* deck labels */
.deck h3{
  margin:0 0 10px;
  color:#00e5ff;
  letter-spacing:2px;
}

/* =========================
   NOW PLAYING AREA
========================= */

.now-playing{
  margin-top:20px;
  display:flex;
  gap:20px;
  align-items:center;
}

/* spinning cover */
#cover{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  animation:spin 6s linear infinite;
  box-shadow:0 0 30px rgba(0,229,255,0.25);
}

/* text */
#track{
  font-size:20px;
  font-weight:600;
}

.sub{
  color:#b3b3ff;
}

/* =========================
   WAVEFORM
========================= */

.wave{
  display:flex;
  gap:4px;
  height:30px;
  align-items:flex-end;
  margin-top:10px;
}

.wave div{
  width:5px;
  background:linear-gradient(180deg,#00e5ff,#ff00cc);
  animation:wave 1s infinite ease-in-out;
  border-radius:3px;
}

@keyframes wave{
  0%,100%{height:5px}
  50%{height:30px}
}

/* =========================
   MESSAGE PANEL
========================= */

.panel{
  margin-top:20px;
  background:rgba(20,22,30,0.6);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(0,229,255,0.15);
}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid rgba(0,229,255,0.2);
  background:rgba(0,0,0,0.35);
  color:#fff;
}

button{
  margin-top:12px;
  width:100%;
  padding:14px;
  background:linear-gradient(90deg,#00e5ff,#ff00cc);
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
  color:#000;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){
  .dj-stage{
    grid-template-columns:1fr;
  }

  .spin-disc{
    display:none;
  }

  #cover{
    width:120px;
    height:120px;
  }
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://video.wixstatic.com/video/4657a4_d5cf9c3f434847e699e739b1d7e3c466/720p/mp4/file.mp4">
</video>

<div class="overlay"></div>

<div class="ticker">
  <span>PSR LIVE • HOUSE • AFRO HOUSE • DNB • REGGAE • DUBSTEP • GLOBAL DJ SESSIONS • NEW MUSIC DAILY • </span>
</div>

<div class="app">

  <div class="hero">
    <h1>Prodigal Sun Radio</h1>
    <h2>DJ LIVE DECK SYSTEM</h2>
  </div>

  <!-- DJ STAGE -->
  <div class="dj-stage">

    <!-- LEFT DECK -->
    <div class="deck">
      <h3>DECK A</h3>
      <div class="sub">Live Stream Input</div>
      <div class="wave">
        <div></div><div></div><div></div><div></div><div></div>
      </div>
    </div>

    <!-- MIXER -->
    <div class="mixer">
      <div>NOW SPINNING</div>
      <div class="spin-disc"></div>
      <div class="fader">
        <input type="range" min="0" max="100" value="50">
      </div>
    </div>

    <!-- RIGHT DECK -->
    <div class="deck">
      <h3>DECK B</h3>

      <div class="now-playing">
        <img id="cover" src="https://i.imgur.com/QPevqGi.png">

        <div>
          <div id="track">Loading...</div>
          <div class="sub">PSR Live Studio</div>

          <div class="wave">
            <div></div><div></div><div></div><div></div><div></div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- MESSAGE -->
  <div class="panel">
    <h3>Send Message to HQ</h3>
    <input id="name" placeholder="Name">
    <textarea id="message" placeholder="Message"></textarea>
    <button onclick="sendMessage()">Send</button>
    <div id="status"></div>
  </div>

</div>

<script>

/* NOW PLAYING */
const API="https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function update(){
  try{
    const r=await fetch(API);
    const d=await r.json();
    document.getElementById("track").innerHTML =
      "<b>"+d.artist+"</b><br>"+d.title;
    document.getElementById("cover").src =
      d.cover || "https://i.imgur.com/QPevqGi.png";
  }catch(e){}
}

update();
setInterval(update,15000);

/* FORM */
async function sendMessage(){
  const name=document.getElementById("name");
  const message=document.getElementById("message");
  const status=document.getElementById("status");

  status.innerText="Sending...";

  await fetch("https://formspree.io/f/mykvabzl",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name.value,message:message.value})
  });

  status.innerText="Sent ✔";
}

</script>

</body>
</html>
