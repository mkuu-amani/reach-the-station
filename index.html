<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSR Live Hub</title>

<style>

/* =========================
   BACKGROUND SLIDESHOW (UNCHANGED)
========================= */

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: #0b0c10;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
  position: relative;
  min-height: 100vh;
  overflow-x: hidden;
}

/* slideshow layers */
.bg-slide {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 2.5s ease-in-out;
  z-index: -3;
}

.bg-slide.active {
  opacity: 1;
}

/* dark overlay */
.bg-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 6, 10, 0.75);
  z-index: -2;
}

/* =========================
   LAYOUT
========================= */

.app {
  width: 100%;
  max-width: 1250px;
  display: grid;
  gap: 28px;
  justify-items:center;
}

header {
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 74px;
}
   .site-link {
  margin-top: 10px;
}

.site-link a {
  color: #00e5ff;
  font-size: 16px;
  text-decoration: none;
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(0,229,255,0.4);
  padding-bottom: 2px;
  transition: 0.3s ease;
}

.site-link a:hover {
  color: #ffffff;
  border-bottom-color: #ffffff;
}

/* =========================
   TIGHTER CARDS (FIX)
========================= */

.card,
.panel {
  background:#151820;
  border-radius:22px;
  padding:28px;
  height:fit-content;

  width:min(1100px,95vw);

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 0 20px rgba(0,229,255,0.10),
    0 0 45px rgba(0,229,255,0.08);
}

/* =========================
   NOW PLAYING CARD
========================= */

.card {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  position: relative;
}

.live {
  position: absolute;
  top: 10px;
  right: 12px;
  background: #ff3b3b;
  color: #fff;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: 20px;
  letter-spacing: 1px;
  animation: livePulse 2.8s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.12); opacity: 1; }
}

#cover {
  width: clamp(240px,26vw,340px);
  height: clamp(240px,26vw,340px);
  border-radius: 14px;
  object-fit: cover;
  flex-shrink: 0;
}

.info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#track {
  font-size:24px;
  line-height:1.55;
}

.sub {
  color:#aaa;
  font-size:17px;
}

/* =========================
   PLAYER
========================= */

.neon-player {
  width: 100%;
  border-radius: 14px;
  overflow: visible;
  box-shadow:
    0 0 14px rgba(0,229,255,0.25),
    0 0 35px rgba(0,229,255,0.12);
}

.neon-player iframe {
  width:100%;
  height:175px;
  border: 0;
  display: block;
  background: #000;
}

/* =========================
   FORM
========================= */

input, textarea {
  width:100%;
  padding:18px;
  font-size:17px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #2a2f3a;
  background: #0d0f14;
  color: #fff;
  box-sizing: border-box;
}

textarea {
  min-height: 190px;
  resize: vertical;
}

button {
  width:100%;
  margin-top:18px;
  padding:18px;
  font-size:18px;
  border: none;
  border-radius: 10px;
  background: #1db954;
  color: #000;
  font-weight: 700;
  cursor: pointer;
}

button:hover {
  background: #17a74a;
}

#status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}

/* =========================
   MOBILE
========================= */

@media (max-width: 600px) {
  .card {
    flex-direction: column;
    align-items: center;
  }

  #cover {
    width: 180px;
    height: 180px;
  }

  .info {
    width: 100%;
  }
}

</style>
</head>

<body>

<!-- BACKGROUND SLIDESHOW -->
<div class="bg-slide active" style="background-image:url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4');"></div>
<div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1507838153414-b4b713384a76');"></div>
<div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f');"></div>
<div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d');"></div>
<div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3');"></div>
<div class="bg-slide" style="background-image:url('https://static.wixstatic.com/media/4657a4_cccc31ae6cef43839ce5a7963c8417e5~mv2.png');"></div>
<div class="bg-slide" style="background-image:url('https://static.wixstatic.com/media/4657a4_15c04aaa3e184d52832fb9dbf45bae06~mv2.png');"></div>
<div class="bg-slide" style="background-image:url('https://static.wixstatic.com/media/4657a4_2e274bae00f346dd948d1b24095de00c~mv2.png');"></div>
<div class="bg-slide" style="background-image:url('https://video.wixstatic.com/video/4657a4_d5cf9c3f434847e699e739b1d7e3c466/720p/mp4/file.mp4');"></div>
<div class="bg-slide" style="background-image:url('https://static.wixstatic.com/media/4657a4_91439f40e9324d5eb72dddb839a0dfb1~mv2.jpg');"></div>

<div class="bg-overlay"></div>

<div class="app">

  <header>
    <h1>🎧 Prodigal Sun Radio</h1>
  </header>
   <header>
    <h2>ProdigalSunRadio.Com</h2>
  </header>

  <div class="card">

    <div class="live">LIVE</div>

    <img id="cover" src="https://i.imgur.com/QPevqGi.png">

    <div class="info">

      <div id="track">Loading now playing...</div>
      <div class="sub">Live from PSR Studio</div>

      <div class="neon-player">
        <iframe
          src="https://player.radioking.io/the-channel-x/?c=%23000&c2=%2300e5ff&f=0&i=0&p=0&s=0&alb=0&li=0&popup=0&plc=0&h=undefined&l=110&v=2"
          allow="autoplay">
        </iframe>
      </div>

    </div>
  </div>

  <div class="panel">
    <h3>✉️ Send Message to HQ</h3>

    <input type="text" id="name" placeholder="Your name">
    <textarea id="message" placeholder="Your message"></textarea>

    <button onclick="sendMessage()">Send Message</button>
    <div id="status"></div>
  </div>

</div>

<script>

/* SLIDESHOW */
const slides = document.querySelectorAll(".bg-slide");
let current = 0;

setInterval(() => {
  slides[current].classList.remove("active");
  current = (current + 1) % slides.length;
  slides[current].classList.add("active");
}, 6000);

/* NOW PLAYING */
const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function updateNowPlaying() {
  try {
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();

    document.getElementById("track").innerHTML =
      "<b>" + data.artist + "</b><br>" + data.title;

    document.getElementById("cover").src =
      data.cover || "https://i.imgur.com/QPevqGi.png";

  } catch (e) {
    document.getElementById("track").innerText =
      "Unable to load now playing";
  }
}

updateNowPlaying();
setInterval(updateNowPlaying, 15000);

/* FORM */
const ENDPOINT = "https://formspree.io/f/mykvabzl";

async function sendMessage() {
  const name = document.getElementById("name");
  const message = document.getElementById("message");
  const status = document.getElementById("status");

  if (!name.value.trim() || !message.value.trim()) {
    status.innerText = "Please fill in all fields";
    return;
  }

  status.innerText = "Sending...";

  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({
        name: name.value.trim(),
        message: message.value.trim(),
        station: "PSR Live Hub"
      })
    });

    if (res.ok) {
      status.innerText = "Message sent to HQ ✔";
      name.value = "";
      message.value = "";
    } else {
      status.innerText = "Failed to send message";
    }

  } catch (err) {
    status.innerText = "Network error";
  }
}

</script>

</body>
</html>
