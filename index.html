<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSR Broadcast Console</title>

<style>

/* =========================
   GLOBAL FONT SYSTEM
========================= */

*{
  box-sizing:border-box;
  font-family:"Inter","Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body{
  margin:0;
  background:#f5f7fb;
  overflow-x:hidden;
}

/* BACKGROUND VIDEO */
#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.9) saturate(1.4) contrast(1.1);
  transform:scale(1.05);
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,120,255,0.40), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,180,255,0.30), transparent 45%),
    linear-gradient(180deg, rgba(0,90,255,0.20), rgba(0,0,40,0.55));
  z-index:-4;
}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  width:100%;
  padding:10px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  font-size:12px;
  letter-spacing:1.5px;
  color:#333;
  z-index:10;
}

/* ON AIR */
.onair-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}

.onair-strip{
  font-size:11px;
  font-weight:800;
  padding:4px 10px;
  border-radius:4px;
  color:#fff;
  background:linear-gradient(90deg,#ff0000,#ff2b2b,#ff0066);
  animation:pulseAir 1.2s infinite;
}

@keyframes pulseAir{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.08);opacity:0.85;}
}

.live-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ff2b2b;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.3}
}

/* LAYOUT */
.app{
  max-width:1200px;
  margin:0 auto;
  padding:70px 20px 20px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.console{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:18px;
}

.panel{
  background:rgba(255,255,255,0.94);
  border-radius:14px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* VIDEO PANEL */
.video-panel{
  position:relative;
  overflow:hidden;
  min-height:360px;
}

.panel-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

.panel-overlay{
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.65));
  z-index:1;
}

.panel-content{
  position:relative;
  z-index:2;
  padding:18px;
}

/* =========================
   NOW PLAYING (FIXED COVER ART)
========================= */

.now-playing{
  display:flex;
  gap:16px;
  align-items:center;
}

/* 🔥 COVER ART RESTORED + GLOW */
#cover{
  width:140px;
  height:140px;
  border-radius:12px;
  object-fit:cover;

  border:2px solid rgba(0,194,255,0.9);

  box-shadow:
    0 0 10px rgba(0,194,255,0.8),
    0 0 25px rgba(0,194,255,0.6),
    0 0 60px rgba(0,194,255,0.4);

  animation:coverPulse 2.5s infinite ease-in-out;
}

@keyframes coverPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

/* TRACK TEXT */
#track{
  font-size:18px;
  font-weight:800;
  color:#fff;
}

.sub{
  font-size:12px;
  color:rgba(255,255,255,0.75);
  margin-top:4px;
}

/* VU METERS */
.meters{
  display:flex;
  gap:3px;
  margin-top:12px;
  height:30px;
  align-items:flex-end;
}

.meters span{
  width:4px;
  background:linear-gradient(to top,#0066ff,#00c2ff,#ff00cc);
  animation:vu 1s infinite ease-in-out;
  border-radius:2px;
}

@keyframes vu{
  0%,100%{height:5px;opacity:0.5}
  50%{height:30px;opacity:1}
}

/* STREAM */
.stream{
  margin-top:14px;
  border-radius:10px;
  overflow:hidden;
}

/* MESSAGE PANEL TITLE */
.message-panel h3{
  color:#1f4fff;
  font-size:18px;
  font-weight:800;
  text-shadow:0 0 8px rgba(31,79,255,0.6);
}

/* INPUTS */
input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  font-size:13px;
}

/* BUTTON */
button{
  margin-top:12px;
  width:100%;
  padding:13px;
  background:linear-gradient(90deg,#0066ff,#00c2ff,#ff00cc);
  border:none;
  border-radius:10px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){
  .console{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://video.wixstatic.com/video/4657a4_aaaaed5a8c4a4ada90f76bf1ae6ce200/720p/mp4/file.mp4">
</video>

<div class="overlay"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="onair-wrap">
    <span class="onair-strip">ON AIR</span>
    <span class="live-dot"></span>
    PSR LIVE BROADCAST
  </div>
  <div>PRODIGALSUNRADIO.COM</div>
</div>

<div class="app">

  <div class="console">

    <!-- PLAYER (FULL RESTORED COVER ART) -->
    <div class="panel video-panel">

      <video class="panel-video" autoplay muted loop playsinline>
        <source src="https://video.wixstatic.com/video/4657a4_6eda907b96f946c5a7d5d65d21e9c679/1080p/mp4/file.mp4">
      </video>

      <div class="panel-overlay"></div>

      <div class="panel-content">

        <div class="now-playing">

          <!-- ✅ COVER ART BACK IN PLACE -->
          <img id="cover" src="https://i.imgur.com/QPevqGi.png">

          <div>
            <div id="track">Loading...</div>
            <div class="sub">Live Studio Feed</div>

            <div class="meters">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>

        </div>

        <div class="stream">
          <iframe width="100%" height="140"
          src="https://player.radioking.io/the-channel-x/?c=%23000&c2=%230066ff"
          frameborder="0"></iframe>
        </div>

      </div>
    </div>

    <!-- MESSAGE -->
    <div class="panel video-panel">

      <div class="panel-content">

        <h3>Send Message to Studio</h3>

        <input id="name" placeholder="Your Name">
        <textarea id="message" placeholder="Your Message"></textarea>

        <button onclick="sendMessage()">SEND</button>

        <div id="status"></div>

      </div>

    </div>

  </div>

</div>

<script>

/* LIVE TRACK + COVER UPDATE */
const API="https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function update(){
  try{
    const r=await fetch(API);
    const d=await r.json();

    document.getElementById("track").innerHTML =
      "<b>"+d.artist+"</b><br>"+d.title;

    document.getElementById("cover").src =
      d.cover || "https://i.imgur.com/QPevqGi.png";

  }catch(e){}
}

update();
setInterval(update,15000);

/* MESSAGE */
async function sendMessage(){
  const name=document.getElementById("name");
  const message=document.getElementById("message");
  const status=document.getElementById("status");

  status.innerText="Sending...";

  await fetch("https://formspree.io/f/mykvabzl",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name.value,message:message.value})
  });

  status.innerText="Message Sent ✔";

  name.value="";
  message.value="";
}

</script>

</body>
</html>
