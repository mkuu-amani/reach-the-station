<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSR Live Hub - Premium Neon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,Arial;
  color:#fff;
  overflow-x:hidden;
  background:#05060a;
}

/* =========================
   VIDEO BACKGROUND
========================= */

#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.45) contrast(1.25) saturate(1.5) hue-rotate(-8deg);
  transform:scale(1.08);
}

/* =========================
   OVERLAY
========================= */

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(0,229,255,0.35), transparent 45%),
    radial-gradient(circle at 85% 25%, rgba(255,0,200,0.28), transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(140,0,255,0.25), transparent 50%),
    rgba(5,6,10,0.65);
  z-index:-4;
}

/* =========================
   TICKER
========================= */

.ticker{
  position:fixed;
  top:0;
  width:100%;
  overflow:hidden;
  background:rgba(0,0,0,0.55);
  border-bottom:1px solid rgba(0,229,255,0.25);
  backdrop-filter:blur(10px);
  z-index:10;
}

.ticker span{
  display:inline-block;
  white-space:nowrap;
  padding:12px 0;
  animation:scroll 18s linear infinite;
  font-size:12px;
  letter-spacing:3px;
  color:#00e5ff;
  text-shadow:0 0 10px rgba(0,229,255,0.4);
}

@keyframes scroll{
  from{transform:translateX(100%)}
  to{transform:translateX(-100%)}
}

/* =========================
   LAYOUT
========================= */

.app{
  max-width:1200px;
  margin:90px auto 60px;
  padding:20px;
  display:grid;
  gap:26px;
}

/* =========================
   HERO
========================= */

.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h1{
  font-size:64px;
  margin:0;
  letter-spacing:3px;
  text-transform:uppercase;
  background:linear-gradient(90deg,#00e5ff,#ff00cc,#8a2be2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 25px rgba(0,229,255,0.15);
}

.hero h2{
  font-weight:400;
  color:#9aa0ff;
  margin-top:12px;
  letter-spacing:2px;
}

/* =========================
   CARDS / PANELS
========================= */

.card,.panel{
  background:linear-gradient(145deg,rgba(20,22,30,0.75),rgba(10,12,18,0.55));
  border:1px solid rgba(0,229,255,0.18);
  backdrop-filter:blur(18px);
  border-radius:20px;
  padding:24px;
  box-shadow:
    0 0 25px rgba(0,229,255,0.12),
    0 0 60px rgba(255,0,200,0.05);
  position:relative;
  overflow:hidden;
}

/* glow border */
.card::before,.panel::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(120deg,#00e5ff,#ff00cc,#8a2be2);
  opacity:0.25;
  filter:blur(18px);
  z-index:0;
}

.card > *, .panel > *{
  position:relative;
  z-index:1;
}

/* =========================
   LIVE BADGE
========================= */

.live{
  position:absolute;
  top:14px;
  right:14px;
  background:linear-gradient(90deg,#ff004c,#ff3b3b);
  padding:6px 14px;
  border-radius:30px;
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  animation:pulse 1.6s infinite;
  box-shadow:0 0 20px rgba(255,0,76,0.4);
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.12)}
}

/* =========================
   COVER
========================= */

#cover{
  width:230px;
  height:230px;
  border-radius:16px;
  object-fit:cover;
  box-shadow:0 0 25px rgba(0,229,255,0.25);
}

/* =========================
   TEXT
========================= */

#track{
  font-size:24px;
  font-weight:600;
}

.sub{
  color:#b3b3ff;
  margin-bottom:10px;
}

/* =========================
   WAVES
========================= */

.wave{
  display:flex;
  gap:4px;
  height:40px;
  align-items:flex-end;
  margin-top:12px;
}

.wave div{
  width:6px;
  background:linear-gradient(180deg,#00e5ff,#ff00cc);
  animation:wave 1.1s infinite ease-in-out;
  border-radius:4px;
  box-shadow:0 0 10px rgba(0,229,255,0.4);
}

@keyframes wave{
  0%,100%{height:6px;opacity:0.5}
  50%{height:42px;opacity:1}
}

/* =========================
   FORM
========================= */

input,textarea{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid rgba(0,229,255,0.2);
  background:rgba(0,0,0,0.35);
  color:#fff;
  outline:none;
}

input:focus,textarea:focus{
  border-color:#00e5ff;
  box-shadow:0 0 15px rgba(0,229,255,0.25);
}

button{
  margin-top:12px;
  width:100%;
  padding:14px;
  background:linear-gradient(90deg,#00e5ff,#ff00cc);
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
  color:#000;
  letter-spacing:1px;
  box-shadow:0 0 20px rgba(0,229,255,0.25);
  transition:0.2s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 30px rgba(255,0,204,0.3);
}

/* =========================
   PARTICLES
========================= */

.particle{
  position:fixed;
  width:4px;
  height:4px;
  background:radial-gradient(circle,#00e5ff,#ff00cc);
  border-radius:50%;
  opacity:0.6;
  animation:float 14s linear infinite;
  z-index:-3;
  box-shadow:0 0 10px rgba(0,229,255,0.4);
}

@keyframes float{
  from{transform:translateY(100vh) translateX(0)}
  to{transform:translateY(-10vh) translateX(30px)}
}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){
  .card{flex-direction:column;text-align:center}
  #cover{width:180px;height:180px}
  .hero h1{font-size:42px}
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://video.wixstatic.com/video/4657a4_d5cf9c3f434847e699e739b1d7e3c466/720p/mp4/file.mp4">
</video>

<div class="overlay"></div>

<div class="ticker">
  <span>PSR LIVE • HOUSE • AFRO HOUSE • DNB • REGGAE • DUBSTEP • GLOBAL DJ SESSIONS • NEW MUSIC DAILY • </span>
</div>

<div class="app">

  <div class="hero">
    <h1>Prodigal Sun Radio</h1>
    <h2>ProdigalSunRadio.com</h2>
  </div>

  <div class="card">
    <div class="live">LIVE</div>

    <img id="cover" src="https://i.imgur.com/QPevqGi.png">

    <div class="info">
      <div id="track">Loading...</div>
      <div class="sub">Live from PSR Studio</div>

      <div class="wave">
        <div></div><div></div><div></div><div></div><div></div>
      </div>

      <iframe width="100%" height="160"
      src="https://player.radioking.io/the-channel-x/?c=%23000&c2=%2300e5ff"
      frameborder="0"></iframe>
    </div>
  </div>

  <div class="panel">
    <h3>Send Message to HQ</h3>
    <input id="name" placeholder="Name">
    <textarea id="message" placeholder="Message"></textarea>
    <button onclick="sendMessage()">Send</button>
    <div id="status"></div>
  </div>

</div>

<script>

/* PARTICLES */
for(let i=0;i<30;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(8+Math.random()*10)+"s";
  document.body.appendChild(p);
}

/* NOW PLAYING */
const API="https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function update(){
  try{
    const r=await fetch(API);
    const d=await r.json();
    document.getElementById("track").innerHTML =
      "<b>"+d.artist+"</b><br>"+d.title;
    document.getElementById("cover").src = d.cover || "https://i.imgur.com/QPevqGi.png";
  }catch(e){}
}

update();
setInterval(update,15000);

/* FORM */
async function sendMessage(){
  const name=document.getElementById("name");
  const message=document.getElementById("message");
  const status=document.getElementById("status");

  status.innerText="Sending...";

  await fetch("https://formspree.io/f/mykvabzl",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name.value,message:message.value})
  });

  status.innerText="Sent ✔";
}

</script>

</body>
</html>
