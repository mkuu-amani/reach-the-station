<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSR Live Hub</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: #0b0c10;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 900px;
  display: grid;
  gap: 18px;
}

/* HEADER */
header {
  text-align: center;
  padding: 10px 0;
}

header h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 600;
}

/* NOW PLAYING CARD */
.card {
  background: #151820;
  border-radius: 16px;
  padding: 18px;
  display: flex;
  gap: 18px;
  align-items: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  position: relative;
}

/* LIVE BADGE */
.live {
  position: absolute;
  top: 10px;
  right: 12px;
  background: #ff3b3b;
  color: #fff;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 20px;
  letter-spacing: 1px;
}

/* COVER */
#cover {
  width: clamp(160px, 20vw, 220px);
  height: clamp(160px, 20vw, 220px);
  border-radius: 14px;
  object-fit: cover;
}

/* TRACK */
#track {
  font-size: 16px;
  line-height: 1.4;
}

.sub {
  color: #aaa;
  font-size: 13px;
  margin-top: 6px;
}

/* EMBED PLAYER */
.player {
  margin-top: 12px;
}

.player iframe {
  width: 100%;
  height: 120px;
  border: 0;
  border-radius: 10px;
}

/* MESSAGE BOX */
.panel {
  background: #12141a;
  border-radius: 16px;
  padding: 18px;
}

label {
  display: block;
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #2a2f3a;
  background: #0d0f14;
  color: #fff;
  font-size: 14px;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #1db954;
  color: #000;
  font-weight: 700;
  cursor: pointer;
}

button:hover {
  background: #17a74a;
}

#status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}

/* MOBILE */
@media (max-width: 600px) {
  .card {
    flex-direction: column;
    text-align: center;
  }

  #cover {
    width: 190px;
    height: 190px;
  }
}
</style>
</head>

<body>

<div class="app">

  <header>
    <h1>🎧 Prodigal Sun Radio</h1>
  </header>

  <!-- NOW PLAYING -->
  <div class="card">

    <div class="live">LIVE</div>

    <img id="cover" src="https://i.imgur.com/QPevqGi.png">

    <div>

      <div id="track">Loading now playing...</div>
      <div class="sub">Live from PSR Studio</div>

      <!-- EMBEDDED PLAYER (OPTION 1 FIX) -->
      <div class="player">
        <iframe
          src="https://player.radioking.io/the-channel-x/?c=%23000000&c2=%23ECCC68&f=h&i=0&p=1&s=0&alb=0&li=0&popup=0&plc=0&h=undefined&l=120&v=2">
        </iframe>
      </div>

    </div>
  </div>

  <!-- MESSAGE FORM -->
  <div class="panel">
    <h3>✉️ Send Message to HQ</h3>

    <label>Name</label>
    <input type="text" id="name">

    <label>Message</label>
    <textarea id="message"></textarea>

    <button onclick="sendMessage()">Send Message</button>

    <div id="status"></div>
  </div>

</div>

<script>

/* ======================
   NOW PLAYING
====================== */

const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function updateNowPlaying() {
  try {
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();

    const artist = data.artist || "Unknown Artist";
    const title = data.title || "Unknown Title";
    const cover = data.cover || "https://i.imgur.com/QPevqGi.png";

    document.getElementById("track").innerHTML =
      "<b>" + artist + "</b><br>" + title;

    document.getElementById("cover").src = cover;

  } catch (e) {
    document.getElementById("track").innerText =
      "Unable to load now playing";
  }
}

updateNowPlaying();
setInterval(updateNowPlaying, 15000);

/* ======================
   SEND MESSAGE (FORMSPREE FIXED)
====================== */

const ENDPOINT = "https://formspree.io/f/mykvabzl";

async function sendMessage() {
  const name = document.getElementById("name").value.trim();
  const message = document.getElementById("message").value.trim();
  const status = document.getElementById("status");

  if (!name || !message) {
    status.innerText = "Please fill in all fields";
    return;
  }

  status.innerText = "Sending...";

  try {
    const formData = new FormData();
    formData.append("name", name);
    formData.append("message", message);
    formData.append("station", "PSR Live Hub");

    const res = await fetch(ENDPOINT, {
      method: "POST",
      body: formData
    });

    if (res.ok) {
      status.innerText = "Message sent to HQ ✔";
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";
    } else {
      status.innerText = "Failed to send message";
    }

  } catch (err) {
    status.innerText = "Error sending message";
  }
}

</script>

</body>
</html>
