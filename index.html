<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSR Live Hub</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: #0b0c10;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 900px;
  display: grid;
  gap: 18px;
}

/* HEADER */
header {
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

/* NOW PLAYING CARD */
.card {
  background: #151820;
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);

  display: flex;
  gap: 18px;
  align-items: center;
  position: relative;
}

.live {
  position: absolute;
  top: 10px;
  right: 12px;
  background: #ff3b3b;
  color: #fff;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 20px;
  letter-spacing: 1px;
}

/* COVER ART (ONLY ONE) */
#cover {
  width: clamp(160px, 20vw, 220px);
  height: clamp(160px, 20vw, 220px);
  border-radius: 14px;
  object-fit: cover;
}

/* TRACK TEXT */
#track {
  font-size: 16px;
  line-height: 1.4;
}

.sub {
  color: #aaa;
  font-size: 13px;
  margin-top: 6px;
}

/* =========================
   NEON RADIO DECK PLAYER
========================= */

.stream-player {
  width: 100%;
  margin-top: 14px;
}

.neon-deck {
  background: linear-gradient(135deg, #0b0c10, #141a22);
  border-radius: 16px;
  padding: 14px;

  border: 1px solid rgba(0,229,255,0.18);

  box-shadow:
    0 0 18px rgba(0,229,255,0.18),
    0 0 40px rgba(0,229,255,0.08),
    inset 0 0 18px rgba(0,229,255,0.05);

  position: relative;
  overflow: hidden;
}

/* animated glow sweep */
.neon-deck::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  box-shadow: inset 0 0 25px rgba(0,229,255,0.2);
  animation: glowPulse 3.8s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* label */
.deck-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: #00e5ff;
  margin-bottom: 8px;
  text-transform: uppercase;
  opacity: 0.9;
}

/* AUDIO PLAYER */
audio {
  width: 100%;
  height: 44px;
  border-radius: 10px;
  outline: none;

  filter:
    drop-shadow(0 0 6px rgba(0,229,255,0.35))
    contrast(1.1)
    saturate(1.4);
}

/* Chrome styling */
audio::-webkit-media-controls-panel {
  background: linear-gradient(90deg, #0b0c10, #111827);
  border-radius: 10px;
}

audio::-webkit-media-controls-play-button,
audio::-webkit-media-controls-volume-slider,
audio::-webkit-media-controls-mute-button {
  filter: hue-rotate(160deg) brightness(1.3);
}

/* MESSAGE FORM */
.panel {
  background: #12141a;
  border-radius: 16px;
  padding: 18px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #2a2f3a;
  background: #0d0f14;
  color: #fff;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #1db954;
  color: #000;
  font-weight: 700;
  cursor: pointer;
}

button:hover {
  background: #17a74a;
}

#status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}

/* MOBILE */
@media (max-width: 600px) {
  .card {
    flex-direction: column;
    text-align: center;
  }

  #cover {
    width: 180px;
    height: 180px;
  }
}
</style>
</head>

<body>

<div class="app">

  <header>
    <h1>🎧 Prodigal Sun Radio</h1>
  </header>

  <!-- NOW PLAYING -->
  <div class="card">

    <div class="live">LIVE</div>

    <img id="cover" src="https://i.imgur.com/QPevqGi.png">

    <div>
      <div id="track">Loading now playing...</div>
      <div class="sub">Live from PSR Studio</div>

      <!-- NEON STREAM PLAYER -->
      <div class="stream-player">
        <div class="neon-deck">
          <div class="deck-label">🔊 Live Stream</div>

          <audio controls autoplay>
            <source src="https://listen.radioking.com/radio/443393/stream/497783" type="audio/mpeg">
          </audio>

        </div>
      </div>

    </div>
  </div>

  <!-- MESSAGE FORM -->
  <div class="panel">
    <h3>✉️ Send Message to HQ</h3>

    <input type="text" id="name" placeholder="Your name">
    <textarea id="message" placeholder="Your message"></textarea>

    <button onclick="sendMessage()">Send Message</button>
    <div id="status"></div>
  </div>

</div>

<script>

/* NOW PLAYING */
const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function updateNowPlaying() {
  try {
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();

    const artist = data.artist || "Unknown Artist";
    const title = data.title || "Unknown Title";
    const cover = data.cover || "https://i.imgur.com/QPevqGi.png";

    document.getElementById("track").innerHTML =
      "<b>" + artist + "</b><br>" + title;

    document.getElementById("cover").src = cover;

  } catch (e) {
    document.getElementById("track").innerText =
      "Unable to load now playing";
  }
}

updateNowPlaying();
setInterval(updateNowPlaying, 15000);


/* FORMSPREE */
const ENDPOINT = "https://formspree.io/f/mykvabzl";

async function sendMessage() {
  const name = document.getElementById("name").value.trim();
  const message = document.getElementById("message").value.trim();
  const status = document.getElementById("status");

  if (!name || !message) {
    status.innerText = "Please fill in all fields";
    return;
  }

  status.innerText = "Sending...";

  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({
        name,
        message,
        station: "PSR Live Hub"
      })
    });

    if (res.ok) {
      status.innerText = "Message sent to HQ ✔";
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";
    } else {
      status.innerText = "Failed to send message";
    }

  } catch (err) {
    status.innerText = "Network error";
  }
}

</script>

</body>
</html>
