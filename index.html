<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSR Live Hub</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: #0b0c10;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.app {
  width: 100%;
  max-width: 900px;
  display: grid;
  gap: 18px;
}

/* HEADER */
header {
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

/* MAIN CARD */
.card {
  background: #151820;
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);

  display: flex;
  flex-direction: column;
  gap: 14px;

  position: relative;
}

/* LIVE BADGE */
.live {
  position: absolute;
  top: 10px;
  right: 12px;
  background: #ff3b3b;
  color: #fff;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 20px;
}

/* TOP SECTION */
.now-top {
  display: flex;
  gap: 18px;
  align-items: center;
}

/* COVER ART */
#cover {
  width: clamp(160px, 20vw, 220px);
  height: clamp(160px, 20vw, 220px);
  border-radius: 14px;
  object-fit: cover;
}

/* TRACK TEXT */
.meta {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#track {
  font-size: 16px;
  line-height: 1.4;
}

.sub {
  color: #aaa;
  font-size: 13px;
  margin-top: 6px;
}

/* FULL WIDTH PLAYER ROW */
.player-row {
  width: 100%;
}

/* NEON PLAYER */
.neon-player {
  width: 100%;
  border-radius: 14px;
  overflow: hidden;

  box-shadow:
    0 0 12px rgba(0,229,255,0.25),
    0 0 30px rgba(0,229,255,0.12);
}

.neon-player iframe {
  width: 100%;
  height: 120px;
  border: 0;
  display: block;
  filter: saturate(1.1) contrast(1.05);
}

/* MESSAGE PANEL */
.panel {
  background: #12141a;
  border-radius: 16px;
  padding: 18px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #2a2f3a;
  background: #0d0f14;
  color: #fff;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #1db954;
  color: #000;
  font-weight: 700;
  cursor: pointer;
}

button:hover {
  background: #17a74a;
}

#status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}

/* MOBILE */
@media (max-width: 600px) {
  .now-top {
    flex-direction: column;
    text-align: center;
  }

  #cover {
    width: 180px;
    height: 180px;
  }
}
</style>
</head>

<body>

<div class="app">

  <header>
    <h1>🎧 Prodigal Sun Radio</h1>
  </header>

  <!-- NOW PLAYING -->
  <div class="card">

    <div class="live">LIVE</div>

    <!-- TOP ROW -->
    <div class="now-top">
      <img id="cover" src="https://i.imgur.com/QPevqGi.png">

      <div class="meta">
        <div id="track">Loading now playing...</div>
        <div class="sub">Live from PSR Studio</div>
      </div>
    </div>

    <!-- PLAYER FULL WIDTH -->
    <div class="player-row">
      <div class="neon-player">
        <iframe
          src="https://player.radioking.io/the-channel-x/?c=%23000&c2=%2300e5ff&f=0&i=0&p=0&s=0&alb=0&li=0&popup=0&plc=0&h=undefined&l=110&v=2"
          allow="autoplay">
        </iframe>
      </div>
    </div>

  </div>

  <!-- MESSAGE FORM -->
  <div class="panel">
    <h3>✉️ Send Message to HQ</h3>

    <input type="text" id="name" placeholder="Your name">
    <textarea id="message" placeholder="Your message"></textarea>

    <button onclick="sendMessage()">Send Message</button>
    <div id="status"></div>
  </div>

</div>

<script>

/* NOW PLAYING */
const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function updateNowPlaying() {
  try {
    const res = await fetch(API, { cache: "no-store" });
    const data = await res.json();

    const artist = data.artist || "Unknown Artist";
    const title = data.title || "Unknown Title";
    const cover = data.cover || "https://i.imgur.com/QPevqGi.png";

    document.getElementById("track").innerHTML =
      "<b>" + artist + "</b><br>" + title;

    document.getElementById("cover").src = cover;

  } catch (e) {
    document.getElementById("track").innerText =
      "Unable to load now playing";
  }
}

updateNowPlaying();
setInterval(updateNowPlaying, 15000);

/* FORMSPREE */
const ENDPOINT = "https://formspree.io/f/mykvabzl";

async function sendMessage() {
  const name = document.getElementById("name").value.trim();
  const message = document.getElementById("message").value.trim();
  const status = document.getElementById("status");

  if (!name || !message) {
    status.innerText = "Please fill in all fields";
    return;
  }

  status.innerText = "Sending...";

  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({
        name,
        message,
        station: "PSR Live Hub"
      })
    });

    if (res.ok) {
      status.innerText = "Message sent to HQ ✔";
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";
    } else {
      status.innerText = "Failed to send message";
    }

  } catch (err) {
    status.innerText = "Network error";
  }
}

</script>

</body>
</html>
