<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSR Live Hub</title>

<style>
/* =========================
   BACKGROUND SLIDESHOW
========================= */

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
  position: relative;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Slideshow layers */
.bg-slide {
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 2.5s ease-in-out;
  z-index: -3;
}

/* Dark overlay for readability */
.bg-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 6, 10, 0.75);
  z-index: -2;
}

/* ACTIVE SLIDE */
.bg-slide.active {
  opacity: 1;
}

/* =========================
   APP CONTAINER
========================= */

.app {
  width: 100%;
  max-width: 900px;
  display: grid;
  gap: 18px;
  z-index: 2;
  position: relative;
}

/* HEADER */
header {
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 22px;
}

/* NOW PLAYING CARD */
.card {
  background: #151820;
  border-radius: 16px;
  padding: 18px;
  display: flex;
  gap: 18px;
  align-items: flex-start;
  box-shadow: 0 0 18px rgba(0,229,255,0.18),
              0 10px 30px rgba(0,0,0,0.35);
  position: relative;
}

/* LIVE BADGE */
.live {
  position: absolute;
  top: 10px;
  right: 12px;
  background: #ff3b3b;
  color: #fff;
  font-size: 14px;
  padding: 6px 12px;
  border-radius: 30px;
  animation: pulseLive 2.5s infinite;
}

/* bigger + slow pulse */
@keyframes pulseLive {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.75; }
}

/* COVER ART */
#cover {
  width: clamp(160px, 20vw, 220px);
  height: clamp(160px, 20vw, 220px);
  border-radius: 14px;
  object-fit: cover;
  flex-shrink: 0;
}

/* TEXT */
#track {
  font-size: 16px;
  line-height: 1.4;
}

.sub {
  color: #aaa;
  font-size: 13px;
}

/* PLAYER */
.neon-player {
  width: 100%;
  margin-top: 14px;
  border-radius: 14px;
  overflow: hidden;

  box-shadow:
    0 0 14px rgba(0,229,255,0.25),
    0 0 35px rgba(0,229,255,0.12);
}

.neon-player iframe {
  width: 100%;
  height: 140px;
  border: 0;
  display: block;
}

/* MESSAGE FORM */
.panel {
  background: #12141a;
  border-radius: 16px;
  padding: 18px;
  box-shadow: 0 0 18px rgba(0,229,255,0.10);
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #2a2f3a;
  background: #0d0f14;
  color: #fff;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #1db954;
  color: #000;
  font-weight: 700;
  cursor: pointer;
}

button:hover {
  background: #17a74a;
}

#status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}

/* MOBILE */
@media (max-width: 600px) {
  .card {
    flex-direction: column;
    align-items: center;
  }

  #cover {
    width: 180px;
    height: 180px;
  }
}
</style>
</head>

<body>

<!-- BACKGROUND SLIDESHOW -->
<div class="bg-slide active" style="background-image:url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4');"></div>
<div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1507838153414-b4b713384a76');"></div>
<div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f');"></div>
<div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1511379938547-c1f69419868d');"></div>
<div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3');"></div>

<div class="bg-overlay"></div>

<div class="app">

  <header>
    <h1>🎧 Prodigal Sun Radio</h1>
  </header>

  <!-- NOW PLAYING -->
  <div class="card">

    <div class="live">LIVE</div>

    <img id="cover" src="https://i.imgur.com/QPevqGi.png">

    <div>

      <div id="track">Loading now playing...</div>
      <div class="sub">Live from PSR Studio</div>

      <div class="neon-player">
        <iframe
          src="https://player.radioking.io/the-channel-x/?c=%23000&c2=%2300e5ff&f=0&i=0&p=0&s=0&alb=0&li=0&popup=0&plc=0&h=undefined&l=110&v=2"
          allow="autoplay">
        </iframe>
      </div>

    </div>
  </div>

  <!-- MESSAGE FORM -->
  <div class="panel">
    <h3>✉️ Send Message to HQ</h3>

    <input type="text" id="name" placeholder="Your name">
    <textarea id="message" placeholder="Your message"></textarea>

    <button onclick="sendMessage()">Send Message</button>
    <div id="status"></div>
  </div>

</div>

<script>

/* NOW PLAYING */
const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function updateNowPlaying() {
  const res = await fetch(API, { cache: "no-store" });
  const data = await res.json();

  document.getElementById("track").innerHTML =
    "<b>" + data.artist + "</b><br>" + data.title;

  document.getElementById("cover").src =
    data.cover || "https://i.imgur.com/QPevqGi.png";
}

updateNowPlaying();
setInterval(updateNowPlaying, 15000);

/* FORMSPREE */
const ENDPOINT = "https://formspree.io/f/mykvabzl";

async function sendMessage() {
  const name = document.getElementById("name").value.trim();
  const message = document.getElementById("message").value.trim();
  const status = document.getElementById("status");

  if (!name || !message) {
    status.innerText = "Please fill in all fields";
    return;
  }

  status.innerText = "Sending...";

  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, message, station: "PSR Live Hub" })
    });

    status.innerText = res.ok
      ? "Message sent to HQ ✔"
      : "Failed to send message";

    if (res.ok) {
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";
    }

  } catch (err) {
    status.innerText = "Network error";
  }
}

/* BACKGROUND SLIDESHOW LOGIC */
const slides = document.querySelectorAll(".bg-slide");
let current = 0;

setInterval(() => {
  slides[current].classList.remove("active");
  current = (current + 1) % slides.length;
  slides[current].classList.add("active");
}, 6000);

</script>

</body>
</html>
