<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSR Broadcast Console</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: Inter, system-ui, Arial;
    background: #f5f7fb;
    color: #111;
    overflow-x: hidden;
}
/* Background Video */
#bgVideo {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -5;
    filter: brightness(0.9) saturate(1.4) contrast(1.1);
    transform: scale(1.05);
}
.overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, rgba(0,120,255,0.40), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(0,180,255,0.30), transparent 45%),
                radial-gradient(circle at 50% 90%, rgba(0,80,255,0.25), transparent 55%),
                linear-gradient(180deg, rgba(0,90,255,0.20), rgba(0,0,40,0.55));
    z-index: -4;
}
/* GLASS CONTAINER */
.container {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 40px auto;
    padding: 32px 20px 40px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

/* PITCH BLACK + NEON BLUE BANNER */
.pulsating-banner {
    width: 100%;
    max-height: 560px;
    min-height: 380px;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    margin-bottom: 32px;
    box-shadow: 0 15px 40px rgba(0, 100, 255, 0.6);
    animation: pulse-glow 3.5s ease-in-out infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000000;
}

.pulsating-banner img {
    width: 100%;
    height: auto;
    max-height: 100%;
    display: block;
    object-fit: contain;
    transition: transform 0.8s ease;
}

.pulsating-banner:hover img {
    transform: scale(1.015);
}

@keyframes pulse-glow {
    0%, 100% { box-shadow: 0 15px 40px rgba(0, 100, 255, 0.6); }
    50% { box-shadow: 0 20px 70px rgba(0, 180, 255, 0.9); }
}

/* NOW PLAYING - FIXED MOBILE LAYOUT */
.now-playing {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    margin-bottom: 20px;
}

#cover {
    width: 160px;
    height: 160px;
    border-radius: 12px;
    object-fit: cover;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.artist {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.70);
}

.title {
    font-size: 36px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    margin-top: 4px;
}

.sub {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    margin-top: 4px;
}

/* Desktop: Side-by-side */
@media (min-width: 901px) {
    .now-playing {
        flex-direction: row;
        align-items: center;
        text-align: left;
        gap: 20px;
    }
    #cover {
        width: 180px;
        height: 180px;
    }
    .artist { font-size: 32px; }
    .title { font-size: 42px; }
}

/* Small phones */
@media (max-width: 480px) {
    #cover {
        width: 140px;
        height: 140px;
    }
    .artist { font-size: 24px; }
    .title { font-size: 32px; }
}

/* Other styles */
.topbar {
    position: sticky;
    top: 0;
    width: 100%;
    padding: 10px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
    z-index: 10;
    font-size: 12px;
    letter-spacing: 1.5px;
    color: #333;
    border-radius: 12px 12px 0 0;
    margin-bottom: 12px;
}
.app { width: 100%; margin: 0; min-height: 85dvh; display: flex; flex-direction: column; gap: 20px; }
.header { text-align: center; margin: 0; padding-top: 10px; }
.header h1 {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    font-size: 56px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #0066ff, #00c2ff, #ff00cc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.header h2 {
    margin-top: 6px;
    font-size: 13px;
    letter-spacing: 3px;
    color: #555;
}
.console { display: flex; flex-direction: column; gap: 20px; width: 100%; }
.panel {
    background: rgba(255,255,255,0.94);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
.video-panel { position: relative; overflow: hidden; min-height: 420px; border: 1px solid rgba(0,180,255,0.25); box-shadow: 0 0 25px rgba(0,120,255,0.15); }
.panel-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
.panel-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.65)),
                radial-gradient(circle at 30% 20%, rgba(0,120,255,0.25), transparent 60%);
    z-index: 1;
}
.panel-content { position: relative; z-index: 2; padding: 24px; }
.stream { margin-top: 20px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); }
.message-panel input, .message-panel textarea {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.1);
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    font-size: 14px;
}
.message-panel h3 { color: #fff; margin-top: 0; font-size: 20px; }
button {
    margin-top: 16px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(90deg, #0066ff, #00c2ff, #ff00cc);
    border: none;
    border-radius: 10px;
    font-weight: 800;
    cursor: pointer;
    color: #fff;
    font-size: 16px;
}
.world-clock-panel {
    margin-top: 28px;
    padding: 18px;
    border-radius: 14px;
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    color: white;
}
.world-clock-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 15px;
    text-align: center;
}
.clock-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
}
.clock {
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
}
.clock-city {
    font-size: 12px;
    letter-spacing: 1.5px;
    opacity: .75;
    margin-bottom: 6px;
}
.clock-time {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 800;
}
@media(max-width:900px) {
    .header h1 { font-size: 38px; line-height: 1; }
    .video-panel { min-height: 380px; }
    .clock-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline>
    <source src="https://video.wixstatic.com/video/4657a4_aaaaed5a8c4a4ada90f76bf1ae6ce200/720p/mp4/file.mp4">
</video>
<div class="overlay"></div>

<div class="topbar">
    <div><span class="live-dot"></span>PSR LIVE BROADCAST</div>
    <div>PRODIGALSUNRADIO.COM</div>
</div>

<div class="container">

    <!-- Banner -->
    <div class="pulsating-banner">
        <img src="https://static.wixstatic.com/media/4657a4_a535786b4ec443ea997191fe4fcb6d19~mv2.png" alt="Prodigal Sun Radio Banner">
    </div>

    <div class="app">
        <div class="header">
            <h1>PRODIGAL SUN RADIO</h1>
            <h2>LIVE BROADCAST CONSOLE</h2>
        </div>

        <div class="console">
            <!-- Now Playing -->
            <div class="panel video-panel">
                <video class="panel-video" autoplay muted loop playsinline>
                    <source src="https://video.wixstatic.com/video/4657a4_6eda907b96f946c5a7d5d65d21e9c679/1080p/mp4/file.mp4">
                </video>
                <div class="panel-overlay"></div>
                <div class="panel-content">
                    <div class="now-playing">
                        <img id="cover" src="https://i.imgur.com/QPevqGi.png">
                        <div>
                            <div id="track">Loading...</div>
                            <div class="sub">Live Studio Feed</div>
                        </div>
                    </div>
                    <div class="stream">
                        <iframe  src="https://player.radioking.io/the-channel-x/?c=%23020000&c2=%23ECCC68&f=h&i=1&p=0&s=0&alb=1&li=1&popup=1&plc=0&h=undefined&l=100&v=2&fullsize" style="border-radius: 5px; width: 170%; height: 145px; -webkit-box-shadow: 0px 0px 20px 0px rgba(0,0,0,0.3);-moz-box-shadow: 0px 0px 20px 0px rgba(0,0,0,0.3);box-shadow: 0px 0px 20px 0px rgba(0,0,0,0.3);" frameBorder="0" ></iframe><script type="text/javascript" src="https://player.radioking.io/scripts/iframe.bundle.js"></script>
                    </div>
                </div>
            </div>

            <!-- Message Panel -->
            <div class="panel video-panel message-panel">
                <video class="panel-video" autoplay muted loop playsinline>
                    <source src="https://video.wixstatic.com/video/4657a4_ed23124ce0fe4a389be438464a925a0c/720p/mp4/file.mp4">
                </video>
                <div class="panel-overlay"></div>
                <div class="panel-content">
                    <h3>Send Message to Studio</h3>
                    <input id="name" placeholder="Your Name">
                    <textarea id="message" placeholder="Your Message" rows="6"></textarea>
                    <button onclick="sendMessage()">SEND MESSAGE</button>
                    <div id="status"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- WORLD CLOCKS -->
    <div class="world-clock-panel">
        <div class="world-clock-title">🌍 PSR WORLD CLOCKS</div>
        <div class="clock-grid">
            <div class="clock">
                <div class="clock-city">🇬🇧 LONDON</div>
                <div class="clock-time" id="london"></div>
            </div>
            <div class="clock">
                <div class="clock-city">🇯🇲 KINGSTON</div>
                <div class="clock-time" id="kingston"></div>
            </div>
            <div class="clock">
                <div class="clock-city">🇺🇸 NEW YORK</div>
                <div class="clock-time" id="newyork"></div>
            </div>
            <div class="clock">
                <div class="clock-city">🇿🇦 JOHANNESBURG</div>
                <div class="clock-time" id="johannesburg"></div>
            </div>
            <div class="clock">
                <div class="clock-city">🇯🇵 TOKYO</div>
                <div class="clock-time" id="tokyo"></div>
            </div>
        </div>
    </div>

</div>

<script>
const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";
async function updateTrack() {
    try {
        const r = await fetch(API);
        const d = await r.json();
        document.getElementById("track").innerHTML =
            '<div class="artist">'+d.artist+'</div>' +
            '<div class="title">'+d.title+'</div>';
        const coverUrl = d.cover || "https://i.imgur.com/QPevqGi.png";
        document.getElementById("cover").src = coverUrl;
    } catch(e) {}
}

function updateWorldClocks() {
    const options = { hour: 'numeric', minute: '2-digit', hour12: true };
    document.getElementById("london").textContent = new Intl.DateTimeFormat('en-US', { ...options, timeZone: 'Europe/London' }).format(new Date());
    document.getElementById("kingston").textContent = new Intl.DateTimeFormat('en-US', { ...options, timeZone: 'America/Jamaica' }).format(new Date());
    document.getElementById("newyork").textContent = new Intl.DateTimeFormat('en-US', { ...options, timeZone: 'America/New_York' }).format(new Date());
    document.getElementById("johannesburg").textContent = new Intl.DateTimeFormat('en-US', { ...options, timeZone: 'Africa/Johannesburg' }).format(new Date());
    document.getElementById("tokyo").textContent = new Intl.DateTimeFormat('en-US', { ...options, timeZone: 'Asia/Tokyo' }).format(new Date());
}

updateTrack();
setInterval(updateTrack, 15000);
updateWorldClocks();
setInterval(updateWorldClocks, 10000);

async function sendMessage() {
    const name = document.getElementById("name");
    const message = document.getElementById("message");
    const status = document.getElementById("status");
    status.innerText = "Sending...";
    await fetch("https://formspree.io/f/mykvabzl", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name: name.value, message: message.value})
    });
    status.innerText = "Message Sent ✔";
    name.value = "";
    message.value = "";
}
</script>
</body>
</html>
