<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSR Broadcast Console</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,Arial;
  background:#05070b;
  color:#fff;
  overflow-x:hidden;
}

/* =========================
   BACKGROUND (SUBTLE STUDIO FEEL)
========================= */

#bgVideo{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
  filter:brightness(0.35) contrast(1.2) saturate(1.1);
  transform:scale(1.05);
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 20%, rgba(0,180,255,0.12), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(255,0,120,0.08), transparent 45%),
    rgba(5,7,11,0.75);
  z-index:-4;
}

/* =========================
   TOP BAR (BROADCAST STYLE)
========================= */

.topbar{
  position:fixed;
  top:0;
  width:100%;
  padding:10px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.6);
  border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(10px);
  z-index:10;
  font-size:12px;
  letter-spacing:2px;
  color:#9fb3c8;
}

.live-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#ff2b2b;
  display:inline-block;
  margin-right:8px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:0.2}
}

/* =========================
   MAIN LAYOUT
========================= */

.app{
  max-width:1200px;
  margin:80px auto;
  padding:20px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}

.header h1{
  margin:0;
  font-size:52px;
  letter-spacing:3px;
  font-weight:800;
  color:#eaf2ff;
}

.header h2{
  margin-top:8px;
  font-size:14px;
  letter-spacing:3px;
  color:#7fa3c7;
}

/* =========================
   CONSOLE GRID
========================= */

.console{
  display:grid;
  grid-template-columns: 1.2fr 1fr;
  gap:20px;
}

/* PANELS */
.panel{
  background:rgba(15,18,24,0.85);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* =========================
   NOW PLAYING MODULE (BBC STYLE)
========================= */

.now-playing{
  display:flex;
  gap:18px;
  align-items:center;
}

#cover{
  width:140px;
  height:140px;
  border-radius:8px;
  object-fit:cover;
  border:1px solid rgba(255,255,255,0.1);
}

.track-info{
  flex:1;
}

#track{
  font-size:18px;
  font-weight:600;
  color:#eaf2ff;
}

.sub{
  font-size:12px;
  color:#8aa6c1;
  margin-top:4px;
}

/* =========================
   VU METERS (BOILER ROOM FEEL)
========================= */

.meters{
  display:flex;
  gap:3px;
  margin-top:14px;
  height:34px;
  align-items:flex-end;
}

.meters span{
  width:4px;
  background:linear-gradient(to top,#00c2ff,#ff2e88);
  animation:vu 1s infinite ease-in-out;
  border-radius:2px;
}

.meters span:nth-child(2){animation-delay:.1s}
.meters span:nth-child(3){animation-delay:.2s}
.meters span:nth-child(4){animation-delay:.3s}
.meters span:nth-child(5){animation-delay:.4s}
.meters span:nth-child(6){animation-delay:.2s}
.meters span:nth-child(7){animation-delay:.1s}

@keyframes vu{
  0%,100%{height:6px;opacity:0.4}
  50%{height:34px;opacity:1}
}

/* =========================
   STREAM MODULE
========================= */

.stream{
  margin-top:14px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
}

/* =========================
   MESSAGE DESK (PRODUCTION STYLE)
========================= */

input,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.35);
  color:#fff;
  outline:none;
  font-size:13px;
}

input:focus,textarea:focus{
  border-color:#4cc9ff;
  box-shadow:0 0 10px rgba(76,201,255,0.2);
}

button{
  margin-top:12px;
  width:100%;
  padding:12px;
  background:#eaf2ff;
  color:#000;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

/* =========================
   RIGHT CONTROL PANEL
========================= */

.control-grid{
  display:grid;
  gap:14px;
}

.small-box{
  padding:14px;
  border-radius:12px;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.05);
  font-size:12px;
  color:#9fb3c8;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){
  .console{
    grid-template-columns:1fr;
  }

  .header h1{
    font-size:36px;
  }

  #cover{
    width:110px;
    height:110px;
  }
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://video.wixstatic.com/video/4657a4_d5cf9c3f434847e699e739b1d7e3c466/720p/mp4/file.mp4">
</video>

<div class="overlay"></div>

<div class="topbar">
  <div><span class="live-dot"></span>PSR BROADCAST LIVE</div>
  <div>PRODIGALSUNRADIO.COM</div>
</div>

<div class="app">

  <div class="header">
    <h1>PRODIGAL SUN RADIO</h1>
    <h2>BROADCAST CONSOLE</h2>
  </div>

  <div class="console">

    <!-- LEFT: NOW PLAYING -->
    <div class="panel">

      <div class="now-playing">

        <img id="cover" src="https://i.imgur.com/QPevqGi.png">

        <div class="track-info">
          <div id="track">Loading...</div>
          <div class="sub">Live Studio Feed</div>

          <div class="meters">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>

      </div>

      <div class="stream">
        <iframe width="100%" height="140"
        src="https://player.radioking.io/the-channel-x/?c=%23000&c2=%2300c2ff"
        frameborder="0"></iframe>
      </div>

    </div>

    <!-- RIGHT: CONTROL / MESSAGE DESK -->
    <div class="panel">

      <div class="control-grid">

        <div class="small-box">
          <b>LIVE STATUS</b><br>
          Studio 1 • Auto DJ • Active Stream
        </div>

        <div>
          <input id="name" placeholder="Listener Name">
          <textarea id="message" placeholder="Send message to studio"></textarea>
          <button onclick="sendMessage()">TRANSMIT</button>
          <div id="status"></div>
        </div>

      </div>

    </div>

  </div>

</div>

<script>

/* NOW PLAYING */
const API="https://api.radioking.io/widget/radio/the-channel-x/track/current";

async function update(){
  try{
    const r=await fetch(API);
    const d=await r.json();
    document.getElementById("track").innerHTML =
      "<b>"+d.artist+"</b><br>"+d.title;
    document.getElementById("cover").src =
      d.cover || "https://i.imgur.com/QPevqGi.png";
  }catch(e){}
}

update();
setInterval(update,15000);

/* MESSAGE */
async function sendMessage(){
  const name=document.getElementById("name");
  const message=document.getElementById("message");
  const status=document.getElementById("status");

  status.innerText="Transmitting...";

  await fetch("https://formspree.io/f/mykvabzl",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name.value,message:message.value})
  });

  status.innerText="✔ Message sent to studio";
}

</script>

</body>
</html>
